services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reaclass
      POSTGRES_USER: reaclass
      POSTGRES_PASSWORD: reaclass_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reaclass -d reaclass"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://reaclass:reaclass_pass@db:5432/reaclass
      NODE_ENV: production
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
